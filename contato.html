<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norma Contábil | Contato</title>
  <meta name="description" content="Fale com a Norma Contábil. Sua empresa merece uma contabilidade que pensa junto com você." />
  <link rel="preload" href="assets/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page page--contato">

  <header class="site-header" id="topo">
    <div class="site-header__inner">
      <a class="brand" href="index.html" aria-label="Norma Contábil - página inicial">
        <img class="brand__logo" src="assets/img/logo.svg" width="161" height="24" alt="norma contábil" />
      </a>
      <nav class="nav" aria-label="Menu principal">
        <a class="nav__link" href="index.html">Home</a>
        <a class="nav__link" href="servicos.html">Serviços</a>
        <a class="nav__link" href="sobre.html">Sobre</a>
        <a class="nav__link" href="blog.html">Blog</a>
        <a class="nav__link is-active" href="contato.html" aria-current="page">Contato</a>
      </nav>
      <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <!-- ===================== CONTATO (azul) ===================== -->
    <section class="contact" id="contato">
      <div class="container">
        <div class="contact__top">
          <h1 class="contact__headline">Sua empresa merece uma contabilidade que pensa junto com você.</h1>
          <ul class="contact__info">
            <li><a href="mailto:contato@normacontabil.com">contato@normacontabil.com</a></li>
            <li><a href="tel:+5551983445863">+55 (51) 98344-5863</a></li>
            <li><a href="https://www.linkedin.com/company/norma-contabil/" target="_blank" rel="noopener">LinkedIn</a></li>
            <li><a href="https://www.instagram.com/norma.contabil/" target="_blank" rel="noopener">Instagram</a></li>
          </ul>
        </div>
        <form class="cform" id="contato-form" novalidate>
          <div class="cform__grid">
            <label class="cfield"><span class="cfield__label">Nome <span class="req">*</span></span><input type="text" name="nome" required /></label>
            <label class="cfield"><span class="cfield__label">Empresa <span class="req">*</span></span><input type="text" name="empresa" required /></label>
            <label class="cfield"><span class="cfield__label">Email <span class="req">*</span></span><input type="email" name="email" required /></label>
            <label class="cfield">
              <span class="cfield__label">Telefone</span>
              <span class="cfield__tel">
                <span class="cfield__cc" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/></svg>
                  <svg viewBox="0 0 20 20" width="12" height="12" fill="currentColor"><path d="M15.6 6.6l.7.7L10.3 13 4.3 7.3 5 6.6l5.3 5.3z"/></svg>
                </span>
                <input type="tel" name="telefone" />
              </span>
            </label>
            <label class="cfield cfield--full"><span class="cfield__label">Mensagem</span><textarea name="mensagem" rows="1"></textarea></label>
          </div>
          <button type="submit" class="cform__submit">Enviar</button>
          <p class="cform__status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <!-- ===================== RODAPÉ (preto) ===================== -->
    <footer class="site-footer">
      <div class="container site-footer__inner-grid">
        <form class="news" id="news-form" novalidate>
          <div class="news__row">
            <input class="news__input" type="email" name="news-email" placeholder="Acompanhe as novidades" aria-label="Acompanhe as novidades" />
            <button type="submit" class="news__submit">Enviar</button>
          </div>
          <p class="news__status" role="status" aria-live="polite"></p>
        </form>
        <ul class="site-footer__contacts">
          <li><a href="mailto:contato@normacontabil.com">contato@normacontabil.com</a></li>
          <li><a href="tel:+5551983445863">+55 (51) 98344-5863</a></li>
        </ul>
      </div>
      <div class="container site-footer__copy"><span>Norma Contábil, 2025.</span></div>
    </footer>
  </main>

  <script src="js/main.js" defer></script>
</body>
</html>
